name: hybrid_digital_docs_assignment_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  dio: ^5.9.2
  json_annotation: ^4.9.0
  intl: ^0.20.2
  heroicons: ^0.11.0
  easy_localization: ^3.0.8
  shimmer: ^3.0.0
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  hive_ce: ^2.2.3
  hive_ce_flutter: ^1.1.0
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  device_info_plus: ^12.3.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.13.0
  json_serializable: ^6.9.0
  hive_ce_generator: ^1.11.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/

  fonts:
    - family: KantumruyPro
      fonts:
        - asset: assets/fonts/KantumruyPro-VariableFont_wght.ttf
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/didoc.png"
