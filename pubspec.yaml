name: hybrid_digital_docs_assignment_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
